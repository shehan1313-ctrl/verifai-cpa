<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&amp;family=DM+Sans:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F0E8"/>

  <!-- Left navy panel -->
  <rect width="520" height="630" fill="#1E2A3B"/>

  <!-- Gold accent line -->
  <rect x="60" y="60" width="28" height="2" fill="#C8A96E" opacity="0.7"/>

  <!-- Shield icon (simplified) -->
  <g transform="translate(60, 80)">
    <path d="M20 2L4 8V16C4 23 9.5 29.5 20 32C30.5 29.5 36 23 36 16V8L20 2Z"
      stroke="#9A7A40" stroke-width="1.5" fill="rgba(154,122,64,0.1)"/>
    <path d="M13 17l5 5L27 13"
      stroke="#9A7A40" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Logo wordmark -->
  <text x="108" y="107" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#F5F0E8" letter-spacing="-0.3">
    Verif<tspan fill="#C8A96E" font-style="italic">AI</tspan> CPA
  </text>

  <!-- Overline -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#C8A96E" letter-spacing="3" opacity="0.8">A CPA GROUP · VERIFYING AI</text>

  <!-- Main headline -->
  <text x="60" y="265" font-family="Georgia, serif" font-size="44" font-weight="400" fill="#FFFFFF" letter-spacing="-0.5">A wrong AI tax</text>
  <text x="60" y="320" font-family="Georgia, serif" font-size="44" font-weight="400" fill="#FFFFFF" letter-spacing="-0.5">answer can cost</text>
  <text x="60" y="375" font-family="Georgia, serif" font-size="44" font-weight="400" fill="#FFFFFF" letter-spacing="-0.5">you thousands.</text>
  <text x="60" y="435" font-family="Georgia, serif" font-size="44" font-style="italic" font-weight="400" fill="#C8A96E" letter-spacing="-0.5">We catch it for $3.80.</text>

  <!-- Sub copy -->
  <text x="60" y="510" font-family="Arial, sans-serif" font-size="15" font-weight="300" fill="rgba(255,255,255,0.5)">Licensed CPAs verify AI tax answers</text>
  <text x="60" y="532" font-family="Arial, sans-serif" font-size="15" font-weight="300" fill="rgba(255,255,255,0.5)">within 48 hours · $19/month</text>

  <!-- Right panel content -->
  <!-- Verification card mockup -->
  <rect x="580" y="80" width="560" height="470" rx="10" fill="white" opacity="0.9"/>

  <!-- Card header -->
  <rect x="580" y="80" width="560" height="46" rx="10" fill="#FDFAF5"/>
  <rect x="580" y="106" width="560" height="20" fill="#FDFAF5"/>
  <circle cx="606" cy="103" r="6" fill="#EDCFCF"/>
  <circle cx="624" cy="103" r="6" fill="#EDE5CF"/>
  <circle cx="642" cy="103" r="6" fill="#CFEDDA"/>
  <text x="660" y="108" font-family="Arial, sans-serif" font-size="10" fill="#AFA89E" letter-spacing="1">VERIFICATION · #0041</text>

  <!-- AI response block -->
  <rect x="604" y="146" width="512" height="90" rx="6" fill="#F5F0E8"/>
  <text x="620" y="168" font-family="Arial, sans-serif" font-size="9" fill="#AFA89E" letter-spacing="1.5">AI RESPONSE — CHATGPT</text>
  <text x="620" y="190" font-family="Arial, sans-serif" font-size="13" fill="#7A7871" font-style="italic">"Yes, W-2 employees can generally deduct</text>
  <text x="620" y="210" font-family="Arial, sans-serif" font-size="13" fill="#7A7871" font-style="italic">home office expenses if used exclusively…"</text>

  <!-- CPA verdict block -->
  <rect x="604" y="254" width="512" height="148" rx="6" fill="#FFFDF7"/>
  <rect x="604" y="254" width="512" height="148" rx="6" fill="none" stroke="#C8A96E" stroke-width="1" opacity="0.3"/>
  <circle cx="622" cy="276" r="4" fill="#9A7A40"/>
  <text x="634" y="280" font-family="Arial, sans-serif" font-size="9" fill="#9A7A40" letter-spacing="1.5">CPA VERDICT</text>
  <text x="620" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#B85450">✗ Incorrect.</text>
  <text x="620" y="334" font-family="Arial, sans-serif" font-size="13" fill="#1E2A3B">The TCJA (2017) suspended the home office</text>
  <text x="620" y="354" font-family="Arial, sans-serif" font-size="13" fill="#1E2A3B">deduction for W-2 employees through 2025.</text>
  <text x="620" y="374" font-family="Arial, sans-serif" font-size="13" fill="#1E2A3B">This deduction is not available under current law.</text>

  <!-- CPA byline -->
  <circle cx="622" cy="415" r="13" fill="#1E2A3B"/>
  <text x="622" y="420" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">S</text>
  <text x="642" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#1E2A3B">Sarah K., CPA</text>
  <text x="642" y="430" font-family="Arial, sans-serif" font-size="10" fill="#AFA89E">Reviewed 2h ago</text>

  <!-- URL badge -->
  <rect x="604" y="430" width="512" height="1" fill="#EDE7DB"/>
  <text x="860" y="522" font-family="Arial, sans-serif" font-size="13" fill="#9A7A40" text-anchor="middle">verifai-cpa.vercel.app</text>
</svg>
